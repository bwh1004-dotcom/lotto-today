<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#080818" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>오늘 나에게 행운이 있었을까?</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-title" content="오늘의 행운" />
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=efc423e7ded01594e4919ffc4b0f0ea6&libraries=services"></script>
    <script>
      if('serviceWorker' in navigator && location.protocol.startsWith('http') && !window.Capacitor){
        window.addEventListener('load',()=>{
          navigator.serviceWorker.register('/lotto-today/sw.js')
            .then(r=>console.log('SW registered'))
            .catch(e=>console.log('SW failed',e));
        });
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #080818; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
